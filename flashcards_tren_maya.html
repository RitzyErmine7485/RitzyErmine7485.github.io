<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards – Tren Maya</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --green: #1a4a2e;
    --gold: #c8a84b;
    --cream: #f5f0e8;
    --dark: #0f2118;
    --light-green: #2d6e47;
    --card-bg: #ffffff;
    --shadow: 0 8px 40px rgba(15,33,24,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    color: var(--cream);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(26,74,46,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(200,168,75,0.12) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    border-bottom: 1px solid rgba(200,168,75,0.25);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    color: var(--gold);
    letter-spacing: 0.02em;
  }

  header p {
    font-size: 0.9rem;
    color: rgba(245,240,232,0.55);
    margin-top: 0.4rem;
    font-weight: 300;
  }

  /* Topic selector */
  .topic-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    padding: 1.5rem 1rem;
    max-width: 960px;
    margin: 0 auto;
  }

  .topic-btn {
    background: rgba(26,74,46,0.35);
    border: 1px solid rgba(200,168,75,0.3);
    color: var(--cream);
    border-radius: 99px;
    padding: 0.45rem 1rem;
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .topic-btn:hover, .topic-btn.active {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
    font-weight: 500;
  }

  /* Progress */
  .progress-bar-wrap {
    max-width: 600px;
    margin: 0 auto 0.5rem;
    padding: 0 1.5rem;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: rgba(245,240,232,0.5);
    margin-bottom: 0.4rem;
  }
  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem 1rem;
    perspective: 1200px;
  }

  .card-wrapper {
    width: 100%;
    max-width: 580px;
    height: 320px;
    position: relative;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
  }

  .card-wrapper.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 18px;
    padding: 2.2rem 2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .card-front {
    background: var(--card-bg);
    color: var(--dark);
  }

  .card-back {
    background: var(--green);
    color: var(--cream);
    transform: rotateY(180deg);
    border: 1px solid rgba(200,168,75,0.4);
  }

  .card-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.45;
  }

  .card-front .card-label { color: var(--green); }
  .card-back .card-label { color: var(--gold); }

  .card-num {
    position: absolute;
    top: 1rem;
    right: 1.4rem;
    font-size: 0.72rem;
    opacity: 0.35;
    font-weight: 500;
  }

  .card-text {
    font-size: clamp(1rem, 2.2vw, 1.22rem);
    font-weight: 400;
    line-height: 1.55;
    max-width: 90%;
  }

  .card-front .card-text { color: var(--dark); }

  .flip-hint {
    margin-top: 1.4rem;
    font-size: 0.75rem;
    opacity: 0.35;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 1rem 1rem 2rem;
  }

  .ctrl-btn {
    background: rgba(26,74,46,0.45);
    border: 1px solid rgba(200,168,75,0.3);
    color: var(--cream);
    border-radius: 99px;
    padding: 0.7rem 1.8rem;
    font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ctrl-btn:hover:not(:disabled) {
    background: rgba(26,74,46,0.8);
    border-color: var(--gold);
  }

  .ctrl-btn:disabled { opacity: 0.3; cursor: default; }

  .ctrl-btn.primary {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
    font-weight: 500;
  }

  .ctrl-btn.primary:hover {
    background: #d4b05a;
    border-color: #d4b05a;
  }

  /* Shuffle badge */
  .shuffle-btn {
    background: transparent;
    border: 1px solid rgba(200,168,75,0.25);
    color: rgba(245,240,232,0.5);
    border-radius: 99px;
    padding: 0.45rem 1rem;
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: 0.3rem;
  }

  .shuffle-btn:hover { color: var(--gold); border-color: var(--gold); }

  /* Swipe hint on mobile */
  @media (max-width: 500px) {
    .card-wrapper { height: 280px; }
    .card-face { padding: 1.6rem 1.4rem; }
  }

  /* card entrance animation */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-area { animation: cardIn 0.35s ease; }
</style>
</head>
<body>

<header>
  <h1>Flashcards · Tren Maya</h1>
  <p>Curso de Inducción del Sistema Ferroviario</p>
</header>

<div class="topic-bar" id="topicBar"></div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="progressText">Tarjeta 1 de 10</span>
    <span id="topicName"></span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="card-area">
  <div class="card-wrapper" id="card" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-label">Pregunta</div>
        <div class="card-num" id="cardNum"></div>
        <div class="card-text" id="questionText"></div>
        <div class="flip-hint">↻ Haz clic para ver la respuesta</div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">Respuesta</div>
        <div class="card-text" id="answerText"></div>
      </div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="ctrl-btn" id="prevBtn" onclick="prevCard()">← Anterior</button>
  <button class="ctrl-btn primary" onclick="flipCard()" id="flipBtn">Voltear</button>
  <button class="ctrl-btn" id="nextBtn" onclick="nextCard()">Siguiente →</button>
  <button class="shuffle-btn" onclick="shuffleCards()">⇄ Mezclar</button>
</div>

const topics = Object.keys(data);
let currentTopic = 0;
let currentCards = [];
let currentIndex = 0;
let isFlipped = false;

function buildTopicBar() {
  const bar = document.getElementById('topicBar');
  topics.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn' + (i === 0 ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => selectTopic(i);
    bar.appendChild(btn);
  });
}

function selectTopic(i) {
  currentTopic = i;
  currentCards = [...data[topics[i]]];
  currentIndex = 0;
  isFlipped = false;
  document.querySelectorAll('.topic-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  render();
}

function render() {
  const card = document.getElementById('card');
  const total = currentCards.length;
  isFlipped = false;
  card.classList.remove('flipped');

  document.getElementById('questionText').textContent = currentCards[currentIndex][0];
  document.getElementById('answerText').textContent = currentCards[currentIndex][1];
  document.getElementById('cardNum').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progressText').textContent = `Tarjeta ${currentIndex + 1} de ${total}`;
  document.getElementById('topicName').textContent = topics[currentTopic];
  document.getElementById('progressFill').style.width = `${((currentIndex + 1) / total) * 100}%`;
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === total - 1;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (currentIndex < currentCards.length - 1) { currentIndex++; render(); }
}

function prevCard() {
  if (currentIndex > 0) { currentIndex--; render(); }
}

function shuffleCards() {
  for (let i = currentCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
  }
  currentIndex = 0;
  render();
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

buildTopicBar();
selectTopic(0);
</script>
